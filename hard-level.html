<title>HCI Module — Complex MCQs (50)</title>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  :root {
    --bg: #0c0e14;
    --bg-elev: #14171f;
    --bg-card: #181b25;
    --ink: #e9ecf3;
    --ink-dim: #9aa3b8;
    --line: #262c3f;
    --accent: #e85d4e;
    --accent-soft: #e85d4e22;
    --correct: #4ade80;
    --correct-soft: #4ade8022;
    --wrong: #f87171;
    --wrong-soft: #f8717122;
    --complex: #e85d4e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Manrope', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    line-height: 1.55;
  }
  .wrap { max-width: 880px; margin: 0 auto; padding: 40px 24px 80px; }

  header.top {
    display: flex; flex-direction: column; gap: 18px;
    padding-bottom: 24px; border-bottom: 1px solid var(--line);
    margin-bottom: 28px;
  }
  .brand {
    font-family: 'Fraunces', serif;
    font-size: clamp(28px, 4vw, 40px);
    font-weight: 800; letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .brand span { color: var(--accent); font-style: italic; }
  .subtitle { color: var(--ink-dim); font-size: 14px; }
  .meta-row {
    display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
    justify-content: space-between;
  }
  .progress-info { display: flex; gap: 16px; align-items: center; font-size: 13px; }
  .progress-info b { color: var(--accent); font-family: 'JetBrains Mono', monospace; }
  .score-pill {
    background: var(--bg-card); border: 1px solid var(--line);
    padding: 6px 12px; border-radius: 999px; font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
  }
  .score-pill .correct-c { color: var(--correct); }
  .score-pill .wrong-c { color: var(--wrong); }

  .search-bar { position: relative; width: 100%; }
  .search-bar input {
    width: 100%; padding: 12px 16px 12px 42px;
    background: var(--bg-card); border: 1px solid var(--line);
    border-radius: 12px; color: var(--ink);
    font-family: inherit; font-size: 14px;
    transition: border-color .2s, background .2s;
  }
  .search-bar input:focus { outline: none; border-color: var(--accent); }
  .search-bar::before {
    content: "⌕"; position: absolute; left: 14px; top: 50%;
    transform: translateY(-50%); color: var(--ink-dim); font-size: 18px;
  }

  .search-results {
    background: var(--bg-card); border: 1px solid var(--line);
    border-radius: 12px; margin-top: 8px;
    max-height: 280px; overflow-y: auto;
    display: none;
  }
  .search-results.open { display: block; }
  .search-result-item {
    padding: 10px 14px; border-bottom: 1px solid var(--line);
    cursor: pointer; font-size: 13px;
    display: flex; gap: 10px; align-items: flex-start;
  }
  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:hover { background: var(--bg-elev); }
  .search-result-item .num {
    color: var(--accent); font-family: 'JetBrains Mono', monospace;
    font-weight: 600; flex-shrink: 0;
  }
  .search-empty { padding: 14px; color: var(--ink-dim); font-size: 13px; text-align: center; }

  .progress-track {
    height: 4px; background: var(--bg-card); border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent), #ffaf7b);
    transition: width .4s ease;
  }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 32px;
    box-shadow: 0 20px 60px -20px #0008;
  }
  .q-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px; flex-wrap: wrap; gap: 10px;
  }
  .q-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; color: var(--ink-dim);
    letter-spacing: 0.08em;
  }
  .difficulty-tag {
    padding: 4px 10px; border-radius: 999px;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
    background: var(--accent-soft); color: var(--complex);
    border: 1px solid #e85d4e55;
  }

  .topic-tag {
    font-size: 11px; color: var(--ink-dim);
    text-transform: uppercase; letter-spacing: 0.1em;
    margin-bottom: 8px;
  }

  .question-text {
    font-family: 'Fraunces', serif;
    font-size: clamp(19px, 2.4vw, 23px);
    font-weight: 600; line-height: 1.4;
    margin-bottom: 24px;
    color: var(--ink);
  }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    background: var(--bg-elev);
    border: 1.5px solid var(--line);
    border-radius: 12px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all .18s ease;
    display: flex; gap: 14px; align-items: flex-start;
    font-size: 15px; text-align: left;
    color: var(--ink); font-family: inherit;
    width: 100%;
  }
  .option:hover:not(.locked) {
    border-color: var(--accent); background: var(--accent-soft);
  }
  .option .letter {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600; color: var(--accent);
    flex-shrink: 0; width: 22px;
  }
  .option.selected { border-color: var(--accent); background: var(--accent-soft); }
  .option.correct { border-color: var(--correct); background: var(--correct-soft); }
  .option.correct .letter { color: var(--correct); }
  .option.wrong { border-color: var(--wrong); background: var(--wrong-soft); }
  .option.wrong .letter { color: var(--wrong); }
  .option.locked { cursor: default; }
  .option .indicator { margin-left: auto; font-size: 18px; flex-shrink: 0; }

  .explanation {
    margin-top: 22px;
    background: var(--bg-elev);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    padding: 18px 20px;
    display: none;
  }
  .explanation.open { display: block; animation: slide .35s ease; }
  @keyframes slide { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .explanation h4 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--accent); margin-bottom: 8px;
  }
  .explanation .verdict {
    font-weight: 700; margin-bottom: 10px;
    font-family: 'Fraunces', serif; font-size: 17px;
  }
  .explanation .verdict.right { color: var(--correct); }
  .explanation .verdict.wrong-v { color: var(--wrong); }
  .explanation .reasoning { color: var(--ink); margin-bottom: 14px; font-size: 14.5px; }
  .explanation .opt-breakdown { display: flex; flex-direction: column; gap: 6px; }
  .explanation .opt-breakdown div {
    font-size: 13px; color: var(--ink-dim);
    padding-left: 12px; border-left: 2px solid var(--line);
  }
  .explanation .opt-breakdown div b { color: var(--ink); font-family: 'JetBrains Mono', monospace; }

  .nav {
    display: flex; justify-content: space-between; gap: 12px;
    margin-top: 24px;
  }
  .btn {
    padding: 12px 22px;
    border-radius: 10px; border: 1px solid var(--line);
    background: var(--bg-card); color: var(--ink);
    font-family: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all .18s;
  }
  .btn:hover:not(:disabled) { background: var(--bg-elev); border-color: var(--accent); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.primary { background: var(--accent); color: #0c0e14; border-color: var(--accent); }
  .btn.primary:hover:not(:disabled) { background: #ff7c6e; }
  .btn.ghost { background: transparent; }

  .footer-actions {
    margin-top: 18px; display: flex; gap: 10px; justify-content: center;
    flex-wrap: wrap;
  }
  .footer-actions .btn { font-size: 12px; padding: 8px 14px; }

  @media (max-width: 600px) {
    .wrap { padding: 24px 16px 60px; }
    .card { padding: 22px; border-radius: 16px; }
    .q-header { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>

const STORAGE_KEY = "hci_mcq_complex_state_v1";

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const parsed = JSON.parse(raw);
    if (typeof parsed.currentIndex !== "number" || !parsed.answers) return defaultState();
    return parsed;
  } catch { return defaultState(); }
}

function defaultState() {
  return { currentIndex: 0, answers: {} };
}

function saveState(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) { console.warn("Save failed", e); }
}

  curNumEl.textContent = state.currentIndex + 1;
  const answered = Object.keys(state.answers).length;
  let correct = 0, wrong = 0;
  Object.entries(state.answers).forEach(([qid, selected]) => {
    const q = QUESTIONS.find(x => x.id === Number(qid));
    if (!q) return;
    if (selected === q.correct) correct++; else wrong++;
  });
  correctCountEl.textContent = correct;
  wrongCountEl.textContent = wrong;
  answeredCountEl.textContent = answered;
  progressFill.style.width = ((state.currentIndex + 1) / QUESTIONS.length * 100) + "%";
}

function letterFor(i) { return ["A", "B", "C", "D"][i]; }

function renderQuestion(index) {
  const q = QUESTIONS[index];
  const userChoice = state.answers[q.id];
  const answered = userChoice !== undefined;

  const optionsHtml = q.options.map((opt, i) => {
    let cls = "option";
    let indicator = "";
    if (answered) {
      cls += " locked";
      if (i === q.correct) { cls += " correct"; indicator = "✓"; }
      else if (i === userChoice) { cls += " wrong"; indicator = "✗"; }
    } else if (userChoice === i) {
      cls += " selected";
    }
    return `
      <button class="${cls}" data-idx="${i}" ${answered ? "disabled" : ""}>
        <span class="letter">${letterFor(i)}</span>
        <span>${opt}</span>
        ${indicator ? `<span class="indicator">${indicator}</span>` : ""}
      </button>`;
  }).join("");

  let explanationHtml = "";
  if (answered) {
    const isRight = userChoice === q.correct;
    const breakdownHtml = q.explanation.perOption.map((txt, i) =>
      `<div><b>${letterFor(i)}.</b> ${txt}</div>`
    ).join("");
    explanationHtml = `
      <div class="explanation open">
        <h4>Explanation</h4>
        <div class="verdict ${isRight ? "right" : "wrong-v"}">
          ${isRight ? "✓ Correct" : "✗ Incorrect"} — answer is ${letterFor(q.correct)}
        </div>
        <div class="reasoning">${q.explanation.reasoning}</div>
        <div class="opt-breakdown">${breakdownHtml}</div>
      </div>`;
  }

  quizArea.innerHTML = `
    <div class="card">
      <div class="q-header">
        <div class="q-num">QUESTION ${String(q.id).padStart(3, "0")} / 50</div>
        <div class="difficulty-tag">complex</div>
      </div>
      <div class="topic-tag">${q.topic}</div>
      <div class="question-text">${q.q}</div>
      <div class="options">${optionsHtml}</div>
      ${explanationHtml}
      <div class="nav">
        <button class="btn" id="prevBtn" ${index === 0 ? "disabled" : ""}>← Back</button>
        <button class="btn primary" id="nextBtn" ${index === QUESTIONS.length - 1 ? "disabled" : ""}>Next →</button>
      </div>
    </div>`;

  document.querySelectorAll(".option").forEach(btn => {
    btn.addEventListener("click", () => {
      if (btn.classList.contains("locked")) return;
      const idx = Number(btn.dataset.idx);
      state.answers[q.id] = idx;
      saveState(state);
      renderQuestion(index);
      updateMeta();
    });
  });
  document.getElementById("prevBtn").addEventListener("click", () => goTo(index - 1));
  document.getElementById("nextBtn").addEventListener("click", () => goTo(index + 1));
}

function goTo(idx) {
  if (idx < 0 || idx >= QUESTIONS.length) return;
  state.currentIndex = idx;
  saveState(state);
  renderQuestion(idx);
  updateMeta();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

const searchInput = document.getElementById("searchInput");
const searchResults = document.getElementById("searchResults");

searchInput.addEventListener("input", (e) => {
  const query = e.target.value.trim().toLowerCase();
  if (!query) { searchResults.classList.remove("open"); searchResults.innerHTML = ""; return; }
  const matches = QUESTIONS.filter(q =>
    q.q.toLowerCase().includes(query) ||
    q.topic.toLowerCase().includes(query) ||
    q.options.some(o => o.toLowerCase().includes(query))
  ).slice(0, 25);

  if (matches.length === 0) {
    searchResults.innerHTML = `<div class="search-empty">No questions match "${escapeHtml(query)}"</div>`;
  } else {
    searchResults.innerHTML = matches.map(q => `
      <div class="search-result-item" data-id="${q.id}">
        <span class="num">${String(q.id).padStart(3, "0")}</span>
        <span>${highlightMatch(q.q, query)} <em style="color:var(--ink-dim); font-size:11px;">— ${q.topic}</em></span>
      </div>`).join("");
    document.querySelectorAll(".search-result-item").forEach(it => {
      it.addEventListener("click", () => {
        const qid = Number(it.dataset.id);
        const idx = QUESTIONS.findIndex(x => x.id === qid);
        if (idx >= 0) {
          goTo(idx);
          searchInput.value = "";
          searchResults.classList.remove("open");
        }
      });
    });
  }
  searchResults.classList.add("open");
});

document.addEventListener("click", (e) => {
  if (!e.target.closest(".search-bar")) searchResults.classList.remove("open");
});

function highlightMatch(text, query) {
  const safe = escapeHtml(text);
  const re = new RegExp(`(${escapeRegex(query)})`, "ig");
  return safe.replace(re, "<mark style='background:var(--accent-soft); color:var(--accent); padding:0 2px; border-radius:3px;'>$1</mark>");
}
function escapeHtml(s) { return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }
function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }

document.getElementById("resetBtn").addEventListener("click", () => {
  if (!confirm("Reset all progress? This will clear all your answers in the Complex MCQs set.")) return;
  state = defaultState();
  saveState(state);
  renderQuestion(0);
  updateMeta();
});

document.getElementById("jumpBtn").addEventListener("click", () => {
  const firstUnanswered = QUESTIONS.findIndex(q => state.answers[q.id] === undefined);
  if (firstUnanswered === -1) {
    alert("All complex questions answered! 🎉");
  } else {
    goTo(firstUnanswered);
  }
});

document.addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT") return;
  if (e.key === "ArrowLeft") goTo(state.currentIndex - 1);
  if (e.key === "ArrowRight") goTo(state.currentIndex + 1);
});

renderQuestion(state.currentIndex);
updateMeta();
</script>
</body>
</html>
