<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MCQ Practice — HCI & Graphics</title>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface-2: #161616;
    --border: #1f1f1f;
    --border-strong: #2a2a2a;
    --text: #e8e8e8;
    --text-dim: #8a8a8a;
    --text-faint: #5a5a5a;
    --accent: #e8e8e8;
    --correct: #4ade80;
    --correct-bg: rgba(74, 222, 128, 0.08);
    --wrong: #f87171;
    --wrong-bg: rgba(248, 113, 113, 0.08);
    --selected: #3b82f6;
    --selected-bg: rgba(59, 130, 246, 0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 780px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .subtitle {
    color: var(--text-dim);
    font-size: 13px;
    margin-top: 4px;
  }

  .stats {
    text-align: right;
    font-size: 12px;
    color: var(--text-dim);
  }

  .stats strong { color: var(--text); font-weight: 600; }

  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  select, .search-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }

  select { cursor: pointer; flex-shrink: 0; }
  select:hover, select:focus { border-color: var(--border-strong); }

  .search-wrap {
    flex: 1;
    min-width: 200px;
    padding: 0;
    display: flex;
    align-items: center;
  }

  .search-wrap input {
    background: transparent;
    border: none;
    color: var(--text);
    padding: 10px 14px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    width: 100%;
  }

  .search-wrap input::placeholder { color: var(--text-faint); }

  .search-results {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    max-height: 280px;
    overflow-y: auto;
    margin-bottom: 16px;
    display: none;
  }

  .search-results.active { display: block; }

  .search-result {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    font-size: 13px;
    transition: background 0.1s;
  }

  .search-result:last-child { border-bottom: none; }
  .search-result:hover { background: var(--surface-2); }

  .search-result .meta {
    color: var(--text-faint);
    font-size: 11px;
    margin-bottom: 2px;
  }

  .search-result .text {
    color: var(--text-dim);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .search-result mark {
    background: rgba(59, 130, 246, 0.25);
    color: var(--text);
    padding: 0 2px;
    border-radius: 2px;
  }

  .empty-search {
    padding: 20px;
    text-align: center;
    color: var(--text-faint);
    font-size: 13px;
  }

  .progress-track {
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    overflow: hidden;
    margin-bottom: 28px;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s ease;
  }

  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 24px;
  }

  .q-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    font-size: 12px;
    color: var(--text-faint);
  }

  .q-meta .badge {
    background: var(--surface-2);
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  .q-text {
    font-size: 16px;
    line-height: 1.55;
    margin-bottom: 8px;
    color: var(--text);
  }

  .q-sketch {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    margin: 16px 0;
    font-family: "SF Mono", "Menlo", "Monaco", "Courier New", monospace;
    font-size: 12px;
    line-height: 1.5;
    color: var(--text-dim);
    white-space: pre;
    overflow-x: auto;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 20px;
  }

  .option {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    font-size: 14px;
    color: var(--text);
    text-align: left;
    width: 100%;
    font-family: inherit;
    line-height: 1.5;
  }

  .option:hover:not(:disabled) {
    border-color: var(--border-strong);
    background: #1a1a1a;
  }

  .option:disabled { cursor: default; }

  .option .letter {
    font-weight: 600;
    color: var(--text-dim);
    flex-shrink: 0;
    min-width: 18px;
  }

  .option.selected {
    border-color: var(--selected);
    background: var(--selected-bg);
  }

  .option.selected .letter { color: var(--selected); }

  .option.correct {
    border-color: var(--correct);
    background: var(--correct-bg);
  }

  .option.correct .letter { color: var(--correct); }

  .option.wrong {
    border-color: var(--wrong);
    background: var(--wrong-bg);
  }

  .option.wrong .letter { color: var(--wrong); }

  .option .indicator {
    margin-left: auto;
    font-size: 12px;
    font-weight: 500;
    flex-shrink: 0;
  }

  .option.correct .indicator { color: var(--correct); }
  .option.wrong .indicator { color: var(--wrong); }

  .feedback {
    margin-top: 16px;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 13px;
    display: none;
  }

  .feedback.show { display: block; }

  .feedback.correct {
    background: var(--correct-bg);
    border: 1px solid rgba(74, 222, 128, 0.25);
    color: var(--correct);
  }

  .feedback.wrong {
    background: var(--wrong-bg);
    border: 1px solid rgba(248, 113, 113, 0.25);
    color: var(--wrong);
  }

  .nav {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
  }

  .nav-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .nav-btn:hover:not(:disabled) {
    background: var(--surface-2);
    border-color: var(--border-strong);
  }

  .nav-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .reset-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 11px;
    font-family: inherit;
    margin-top: 24px;
    transition: all 0.15s;
  }

  .reset-btn:hover {
    color: var(--wrong);
    border-color: rgba(248, 113, 113, 0.4);
  }

  .q-counter {
    text-align: center;
    color: var(--text-faint);
    font-size: 12px;
    margin-top: 16px;
  }

  @media (max-width: 600px) {
    .container { padding: 20px 16px 60px; }
    header { flex-direction: column; gap: 12px; }
    .stats { text-align: left; }
    .question-card { padding: 20px; }
    .q-text { font-size: 15px; }
    .option { font-size: 13px; padding: 12px 14px; }
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }
</style>
</head>
<body>
<div class="container">

  <header>
    <div>
      <h1>MCQ Practice</h1>
      <div class="subtitle">HCI & Computer Graphics — answers saved locally</div>
    </div>
    <div class="stats" id="stats">—</div>
  </header>

  <div class="controls">
    <select id="setSelect"></select>
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Search questions…" autocomplete="off" />
    </div>
  </div>

  <div class="search-results" id="searchResults"></div>

  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>

  <div id="questionContainer"></div>

  <div class="nav">
    <button class="nav-btn" id="prevBtn">← Back</button>
    <div class="q-counter" id="qCounter"></div>
    <button class="nav-btn" id="nextBtn">Next →</button>
  </div>

  <button class="reset-btn" id="resetBtn">Reset answers for this set</button>

</div>

// ============================================================
// STATE
// ============================================================
const STORAGE_KEY = "mcq_quiz_state_v1";

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return { currentSet: "mock1", answers: {}, indices: {} };
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {}
}

let state = loadState();
if (!DATA[state.currentSet]) state.currentSet = "mock1";

// ============================================================
// DOM REFS
// ============================================================
const setSelect = document.getElementById("setSelect");
const searchInput = document.getElementById("search");
const searchResults = document.getElementById("searchResults");
const questionContainer = document.getElementById("questionContainer");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const qCounter = document.getElementById("qCounter");
const progressFill = document.getElementById("progressFill");
const stats = document.getElementById("stats");
const resetBtn = document.getElementById("resetBtn");

// ============================================================
// INIT
// ============================================================
function init() {
  // populate set dropdown
  Object.entries(DATA).forEach(([key, set]) => {
    const opt = document.createElement("option");
    opt.value = key;
    opt.textContent = set.name;
    setSelect.appendChild(opt);
  });
  setSelect.value = state.currentSet;

  setSelect.addEventListener("change", () => {
    state.currentSet = setSelect.value;
    saveState();
    render();
  });

  prevBtn.addEventListener("click", () => {
    const idx = getIndex();
    if (idx > 0) setIndex(idx - 1);
  });

  nextBtn.addEventListener("click", () => {
    const idx = getIndex();
    const total = DATA[state.currentSet].questions.length;
    if (idx < total - 1) setIndex(idx + 1);
  });

  searchInput.addEventListener("input", handleSearch);
  searchInput.addEventListener("focus", handleSearch);
  document.addEventListener("click", (e) => {
    if (!e.target.closest(".search-wrap") && !e.target.closest(".search-results")) {
      searchResults.classList.remove("active");
    }
  });

  resetBtn.addEventListener("click", () => {
    if (confirm("Clear all answers for \"" + DATA[state.currentSet].name + "\"?")) {
      delete state.answers[state.currentSet];
      saveState();
      render();
    }
  });

  // keyboard nav
  document.addEventListener("keydown", (e) => {
    if (document.activeElement === searchInput) return;
    if (e.key === "ArrowRight") nextBtn.click();
    if (e.key === "ArrowLeft") prevBtn.click();
    if (["1","2","3","4","a","b","c","d","A","B","C","D"].includes(e.key)) {
      const map = { "1":"A","2":"B","3":"C","4":"D","a":"A","b":"B","c":"C","d":"D","A":"A","B":"B","C":"C","D":"D" };
      selectOption(map[e.key]);
    }
  });

  render();
}

// ============================================================
// HELPERS
// ============================================================
function getIndex() {
  return state.indices[state.currentSet] || 0;
}

function setIndex(i) {
  state.indices[state.currentSet] = i;
  saveState();
  render();
}

function getAnswers() {
  if (!state.answers[state.currentSet]) state.answers[state.currentSet] = {};
  return state.answers[state.currentSet];
}

function selectOption(letter) {
  const set = DATA[state.currentSet];
  const idx = getIndex();
  const q = set.questions[idx];
  if (!q.options[letter]) return; // option doesn't exist for this Q
  const answers = getAnswers();
  answers[idx] = letter;
  saveState();
  render();
}

// ============================================================
// RENDER
// ============================================================
function render() {
  const set = DATA[state.currentSet];
  const idx = getIndex();
  const total = set.questions.length;
  const q = set.questions[idx];
  const answers = getAnswers();
  const userAnswer = answers[idx];

  // stats
  const answered = Object.keys(answers).length;
  const correct = Object.entries(answers).filter(([i, a]) => set.questions[i].answer === a).length;
  stats.innerHTML = `<strong>${correct}</strong> correct / <strong>${answered}</strong> answered<br><span style="color:var(--text-faint)">of ${total} total</span>`;

  // progress
  progressFill.style.width = ((idx + 1) / total * 100) + "%";

  // counter
  qCounter.textContent = `Question ${idx + 1} of ${total}`;

  // nav buttons
  prevBtn.disabled = idx === 0;
  nextBtn.disabled = idx === total - 1;

  // question card
  const sketchHtml = q.sketch ? `<div class="q-sketch">${escapeHtml(q.sketch)}</div>` : "";
  const optionsHtml = Object.entries(q.options).map(([letter, text]) => {
    let cls = "option";
    let indicator = "";
    if (userAnswer) {
      if (letter === q.answer) {
        cls += " correct";
        indicator = `<span class="indicator">✓ Correct</span>`;
      } else if (letter === userAnswer) {
        cls += " wrong";
        indicator = `<span class="indicator">✗ Your answer</span>`;
      }
    } else if (userAnswer === letter) {
      cls += " selected";
    }
    return `<button class="${cls}" data-letter="${letter}" ${userAnswer ? "disabled" : ""}>
      <span class="letter">${letter}</span>
      <span>${escapeHtml(text)}</span>
      ${indicator}
    </button>`;
  }).join("");

  let feedbackHtml = "";
  if (userAnswer) {
    if (userAnswer === q.answer) {
      feedbackHtml = `<div class="feedback correct show">Correct — answer is ${q.answer}.</div>`;
    } else {
      feedbackHtml = `<div class="feedback wrong show">Incorrect. Correct answer: ${q.answer}) ${escapeHtml(q.options[q.answer])}</div>`;
    }
  }

  questionContainer.innerHTML = `
    <div class="question-card">
      <div class="q-meta">
        <span class="badge">${set.name}</span>
        <span>${idx + 1} / ${total}</span>
      </div>
      <div class="q-text">${escapeHtml(q.q)}</div>
      ${sketchHtml}
      <div class="options">${optionsHtml}</div>
      ${feedbackHtml}
    </div>
  `;

  // wire option clicks
  questionContainer.querySelectorAll(".option").forEach(btn => {
    btn.addEventListener("click", () => {
      if (!btn.disabled) selectOption(btn.dataset.letter);
    });
  });
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

// ============================================================
// SEARCH
// ============================================================
function handleSearch() {
  const query = searchInput.value.trim().toLowerCase();
  if (!query) {
    searchResults.classList.remove("active");
    return;
  }

  const matches = [];
  Object.entries(DATA).forEach(([setKey, set]) => {
    set.questions.forEach((q, idx) => {
      const haystack = (q.q + " " + Object.values(q.options).join(" ")).toLowerCase();
      if (haystack.includes(query)) {
        matches.push({ setKey, setName: set.name, idx, q: q.q });
      }
    });
  });

  if (matches.length === 0) {
    searchResults.innerHTML = `<div class="empty-search">No matches for "${escapeHtml(query)}"</div>`;
  } else {
    searchResults.innerHTML = matches.slice(0, 30).map(m => {
      const highlighted = highlight(m.q, query);
      return `<div class="search-result" data-set="${m.setKey}" data-idx="${m.idx}">
        <div class="meta">${escapeHtml(m.setName)} · Q${m.idx + 1}</div>
        <div class="text">${highlighted}</div>
      </div>`;
    }).join("");
    if (matches.length > 30) {
      searchResults.innerHTML += `<div class="empty-search">+${matches.length - 30} more — refine your search</div>`;
    }
  }
  searchResults.classList.add("active");

  searchResults.querySelectorAll(".search-result").forEach(el => {
    el.addEventListener("click", () => {
      state.currentSet = el.dataset.set;
      setSelect.value = el.dataset.set;
      state.indices[state.currentSet] = parseInt(el.dataset.idx, 10);
      saveState();
      searchInput.value = "";
      searchResults.classList.remove("active");
      render();
    });
  });
}

function highlight(text, query) {
  const escaped = escapeHtml(text);
  const re = new RegExp("(" + query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "gi");
  return escaped.replace(re, "<mark>$1</mark>");
}

init();
</script>
